<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>モンハンサンブレイクポイントランキング！</title>
    <style>
        /* 基本設定 */
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #121212; color: #ecf0f1; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: 20px auto; background: #2c3e50; padding: 20px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
        .header-area { text-align: center; margin-bottom: 20px; }
        h1 { color: #f1c40f; font-size: 1.8em; margin: 0; text-shadow: 2px 2px 4px #000; }
        .sub-title { color: #e67e22; font-size: 1.5em; font-weight: bold; display: block; margin-top: 5px; }

        /* ルールエリア（トグル） */
        .rule-container { background: #34495e; border: 2px solid #e67e22; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        .rule-header { background: #e67e22; color: white; padding: 10px; cursor: pointer; font-weight: bold; text-align: center; display: flex; justify-content: center; align-items: center; }
        .rule-header::after { content: '▲'; margin-left: 10px; transition: 0.3s; }
        .rule-container.closed .rule-header::after { content: '▼'; transform: rotate(180deg); }
        .rule-content { padding: 15px; line-height: 1.6; transition: max-height 0.3s ease-out; max-height: 500px; }
        .rule-container.closed .rule-content { max-height: 0; padding: 0; visibility: hidden; }
        .rule-list { list-style: none; padding: 0; margin: 0; }
        .rule-list li { margin-bottom: 8px; padding-left: 1.5em; position: relative; }
        .rule-list li::before { content: '◈'; position: absolute; left: 0; color: #f1c40f; }
        .point-badge { background: #e74c3c; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .nav-link-area { text-align: center; margin-bottom: 20px; }
        .btn-calc-link { display: inline-block; background-color: #ff8800; color: white; padding: 12px 24px; text-decoration: none; border-radius: 50px; font-weight: bold; font-size: 18px; box-shadow: 0 4px 15px rgba(255, 136, 0, 0.4); border: 2px solid #ffffff; transition: 0.2s; }
        .tabs, .sub-tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 15px; justify-content: center; }
        button { cursor: pointer; border: 2px solid #e67e22; border-radius: 5px; background: transparent; color: #e67e22; font-weight: bold; transition: 0.3s; padding: 6px 12px; font-size: 14px; }
        button.active { background: #e67e22; color: white; }
        .category-tabs .cat-btn { flex: 1; min-width: 100px; border: none; background: #34495e; color: #bdc3c7; }
        .category-tabs .cat-btn.active { background: #e74c3c; color: white; }
        .option-area { background: #34495e; padding: 15px; border-radius: 10px; text-align: center; margin-bottom: 20px; border: 1px solid #444; }
        .option-group { margin: 10px 0; }
        .option-label { display: block; font-size: 0.85em; color: #bdc3c7; margin-bottom: 5px; }
        .filter-area { background: #2c3e50; padding: 10px; text-align: center; border-radius: 5px; margin-bottom: 20px; font-size: 14px; }
        .filter-area label { margin: 0 8px; font-weight: bold; cursor: pointer; white-space: nowrap; }
        #display-title { text-align: center; margin: 20px 0; }
        .current-cat-name { display: block; font-size: 1em; color: #bdc3c7; }
        .current-dept-name { display: block; font-size: 1.8em; color: #f39c12; font-weight: bold; }
        .current-options { color: #f1c40f; font-size: 1em; margin-top: 5px; }
        .mode-title { text-align: center; font-size: 1.5em; font-weight: bold; margin: 30px 0 10px 0; display: block; color: #fff; border-left: 5px solid #e67e22; border-right: 5px solid #e67e22; }
        
        .table-wrapper { overflow-x: hidden; margin-bottom: 30px; }
        table { width: 100%; border-collapse: collapse; background: #fff; color: #333; border-radius: 5px; overflow: hidden; table-layout: fixed; }
        th, td { padding: 10px 5px; border: 1px solid #bdc3c7; text-align: center; font-size: 14px; font-weight: bold; word-break: break-all; }
        th { background: #34495e; color: white; }
        .rank-col { width: 60px; }
        .pts-col { width: 90px; }
        
        .member-row { display: flex; border-bottom: 1px solid #eee; padding: 4px 0; align-items: center; }
        .member-row:last-child { border-bottom: none; }
        .m-name { flex: 1; text-align: center; border-right: 1px solid #eee; }
        .m-wep { flex: 1; text-align: center; color: #555; font-size: 0.9em; }
        
        .rank-1 { background: #fff4d1; } 
        .rank-2 { background: #f0f0f0; } 
        .rank-3 { background: #ffebd1; }

        @media screen and (max-width: 480px) {
            h1 { font-size: 1.4em; }
            .sub-title { font-size: 1.2em; }
            th, td { font-size: 12px; padding: 5px 2px; }
            .rank-col { width: 45px; }
            .pts-col { width: 70px; }
        }
    </style>
</head>
<body>

<div class="nav-link-area">
    <a href="counter.html" class="btn-calc-link">🔥 ポイント計算（スロット発表）はこちら</a>
</div>

<div class="container">
    <div class="header-area">
        <h1>モンハンサンブレイクポイントランキング！</h1>
        <span class="sub-title">早矢りんと杯</span>
    </div>

    <div class="rule-container" id="ruleBox">
        <div class="rule-header" onclick="toggleRules()">🏆 ポイントランキング ルール（クリックで開閉）</div>
        <div class="rule-content">
            <ul class="rule-list">
                <li><strong>大型モンスター：</strong> 危険度 × <span class="point-badge">100 pt</span></li>
                <li><strong>小型モンスター：</strong> 1体につき <span class="point-badge">5 pt</span></li>
                <li><strong>禁止事項：</strong> <span style="color: #e74c3c; font-weight: bold;">闘技場クエストの使用は禁止</span> とします。</li>
                <li><strong>計測：</strong> 決められた制限時間内での合計獲得ポイントを競います。</li>
            </ul>
        </div>
    </div>

    <div class="category-tabs tabs">
        <button class="cat-btn active" onclick="update('cat', 'general')">一般部門</button>
        <button class="cat-btn" onclick="update('cat', 'streamer_only')">配信者限定</button>
        <button class="cat-btn" onclick="update('cat', 'streamer_collab')">配信者枠協力</button>
    </div>

    <div class="option-area">
        <div class="option-group">
            <span class="option-label">【時間部門】</span>
            <div class="tabs">
                <button class="dept-btn active" onclick="update('dept', '1h')">1時間</button>
                <button class="dept-btn" onclick="update('dept', '1.5h')">90分</button>
                <button class="dept-btn" onclick="update('dept', '2h')">120分</button>
            </div>
        </div>
        <div class="option-group">
            <span class="option-label">【アプデ武器防具】</span>
            <div class="sub-tabs">
                <button class="upd-btn active" onclick="update('upd', 'no')">なし</button>
                <button class="upd-btn" onclick="update('upd', 'yes')">あり</button>
            </div>
        </div>
    </div>

    <div class="filter-area">
        <label><input type="checkbox" checked onchange="render()" id="f-solo"> ソロ</label>
        <label><input type="checkbox" checked onchange="render()" id="f-tag"> タッグ</label>
        <label><input type="checkbox" checked onchange="render()" id="f-trio"> トリオ</label>
        <label><input type="checkbox" checked onchange="render()" id="f-full"> フルパ</label>
    </div>

    <div id="display-title">
        <span id="txt-cat" class="current-cat-name">一般部門</span>
        <span id="txt-dept" class="current-dept-name">1時間部門</span>
        <div id="txt-opts" class="current-options">アプデなし</div>
    </div>

    <div id="ranking-area"></div>
</div>

<script>
function toggleRules() {
    document.getElementById('ruleBox').classList.toggle('closed');
}

const setRankData = (playerGroupList=[], pointList=[]) => {
    const data = Array(10).fill(null).map(() => ({ players: [], pts: 0 }));
    pointList.forEach((pt, i) => { if(i < 10) data[i].pts = pt; });
    playerGroupList.forEach((group, i) => { if(i < 10) data[i].players = group; });
    return data;
};

const getEmptyModeSet = (label) => {
    const sample = (prefix, n) => {
        const group = [];
        for(let i=0; i<n; i++) group.push([`${prefix}ハンター${i+1}`, '武器種']);
        return group;
    };
    return {
        solo: setRankData([[sample(`${label}ソロ`, 1)[0]], [sample(`${label}ソロ`, 1)[0]], [sample(`${label}ソロ`, 1)[0]]], [300, 200, 100]),
        tag:  setRankData([sample(`${label}タッグ`, 2), sample(`${label}タッグ`, 2), sample(`${label}タッグ`, 2)], [600, 400, 200]),
        trio: setRankData([sample(`${label}トリオ`, 3), sample(`${label}トリオ`, 3), sample(`${label}トリオ`, 3)], [900, 600, 300]),
        full: setRankData([sample(`${label}フルパ`, 4), sample(`${label}フルパ`, 4), sample(`${label}フルパ`, 4)], [1200, 800, 400])
    };
};

const rankingData = {
    general: {
        '1h': {
            'upd-no': {
                solo: setRankData([[['チャトラ', '太刀']], [['早矢りんと', '太刀']], [['フェンリル', '双剣']]], [920, 575, 475]),
                tag:  getEmptyModeSet('1h通').tag,
                trio: getEmptyModeSet('1h通').trio,
                full: getEmptyModeSet('1h通').full
            },
            'upd-yes': getEmptyModeSet('1hア')
        },
        '1.5h': {
            'upd-no': getEmptyModeSet('90分'),
            'upd-yes': getEmptyModeSet('90分ア')
        },
        '2h': {
            'upd-no': getEmptyModeSet('120分'),
            'upd-yes': getEmptyModeSet('120分ア')
        }
    },
    streamer_only: { 
        '1h': { 
            'upd-no': {
                solo: setRankData([[['早矢りんと', '太刀']], [['星藍こーちゃ', 'ランス']]], [1150, 675]),
                tag:  getEmptyModeSet('配信1h').tag,
                trio: getEmptyModeSet('配信1h').trio,
                full: getEmptyModeSet('配信1h').full
            },
            'upd-yes': getEmptyModeSet('配信1hア')
        },
        '1.5h': { 'upd-no': getEmptyModeSet('配信90'), 'upd-yes': getEmptyModeSet('配信90ア') },
        '2h': { 'upd-no': getEmptyModeSet('配信120'), 'upd-yes': getEmptyModeSet('配信120ア') }
    },
    streamer_collab: { 
        '1h': { 'upd-no': getEmptyModeSet('協力1h'), 'upd-yes': getEmptyModeSet('協力1hア') },
        '1.5h': { 'upd-no': getEmptyModeSet('協力90'), 'upd-yes': getEmptyModeSet('協力90ア') },
        '2h': { 'upd-no': getEmptyModeSet('協力120'), 'upd-yes': getEmptyModeSet('協力120ア') }
    }
};

let state = { cat: 'general', dept: '1h', upd: 'no' };

function update(key, value) {
    state[key] = value;
    render();
}

function render() {
    const catNames = { general:'一般部門', streamer_only:'配信者限定', streamer_collab:'配信者枠協力' };
    const deptNames = { '1h':'1時間部門', '1.5h':'90分部門', '2h':'120分部門' };
    document.getElementById('txt-cat').textContent = catNames[state.cat];
    document.getElementById('txt-dept').textContent = deptNames[state.dept];
    document.getElementById('txt-opts').textContent = `アプデ${state.upd === 'yes' ? 'あり' : 'なし'}`;
    
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(state.cat)));
    document.querySelectorAll('.dept-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(state.dept)));
    document.querySelectorAll('.upd-btn').forEach(b => b.classList.toggle('active', b.onclick.toString().includes(state.upd)));

    const area = document.getElementById('ranking-area');
    area.innerHTML = '';
    const modes = [{id:'solo', label:'ソロ（1人）'}, {id:'tag', label:'タッグ（2人）'}, {id:'trio', label:'トリオ（3人）'}, {id:'full', label:'フルパ（4人）'}];
    
    const dataKey = `upd-${state.upd}`;
    const currentDataRoot = (rankingData[state.cat] && rankingData[state.cat][state.dept]) ? rankingData[state.cat][state.dept][dataKey] || getEmptyModeSet('空') : getEmptyModeSet('空');

    modes.forEach(m => {
        if(!document.getElementById('f-' + m.id).checked) return;
        let html = `<span class="mode-title">${m.label}</span><div class="table-wrapper"><table><thead><tr><th class="rank-col">順位</th><th>メンバー (名前 / 武器種)</th><th class="pts-col">ポイント</th></tr></thead><tbody>`;
        const d = currentDataRoot[m.id] || [];
        for(let i=0; i<10; i++) {
            const row = d[i] || { players: [], pts: 0 };
            const rank = i+1;
            const cls = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';
            html += `<tr class="${cls}"><td>${rank}位</td><td>`;
            if(row.players.length === 0) {
                html += `<div class="member-row"><div class="m-name">---</div><div class="m-wep">---</div></div>`;
            } else {
                row.players.forEach(p => {
                    html += `<div class="member-row"><div class="m-name">${p[0]}</div><div class="m-wep">${p[1]}</div></div>`;
                });
            }
            html += `</td><td>${row.pts > 0 ? row.pts.toLocaleString() + ' pt' : '---'}</td></tr>`;
        }
        html += `</tbody></table></div>`;
        area.innerHTML += html;
    });
}
window.onload = render;
</script>
</body>
</html>
